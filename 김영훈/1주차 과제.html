<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../김영훈/과제style.css">
    <title>포트폴리오</title>
</head>
<body>
    <div class="container">
        <div class="container-image">
            <img src="김영훈.jpg" alt="김영훈">
        </div>
        <h2>김 영 훈</h2>
        <div class="container-contents">
            <p>멋쟁이 사자처럼 14기 아기사자 김영훈입니다.</p>
        </div>
        <div class="tab-bar">
            <div class="tab" onclick="showTab('tab1')">소개</div>
            <div class="tab" onclick="showTab('tab2')">경력</div>
            <div class="tab" onclick="showTab('tab3')">목표</div>
        </div>
        <div id="tab1" class="tab-content">
            <p>• 상명대학교 컴퓨터과학전공 23학번</p>
            <p>• 멋쟁이 사자처럼 14기 프론트엔드</p>
            <p>• MBTI: ISTJ</p>
            <p>• E-MAIL: younghk0527@naver.com</p>
            <link rel="stylesheet" href="https://github.com/hoon8158">
            <p>• GIT: <a href="https://github.com/hoon8158">https://github.com/hoon8158</a>
            </p>
        </div>
        <div id="tab2" class="tab-content">
            <p>• 알 깨기 게임 제작(PYTHON)</p>
            <p>• 학점 계산기 제작(C)</p>
            <p>• 운동 일지 사이트 제작(JAVA, SPRING)</p>
        </div>
        <div id="tab3" class="tab-content">
            <p>• 프론트엔드 기초 학습</p>
            <p>• 프로젝트 진행</p>
            <p>• 멋사 화이팅</p>
        </div>
    </div>
</body>
</html>

<script>
function showTab(id) {
    const contents = document.querySelectorAll('.tab-content');
    contents.forEach(content => content.style.display = 'none');

    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(tab => tab.classList.remove('active'));

    document.getElementById(id).style.display = 'block';

    event.target.classList.add('active');
}
</script>
